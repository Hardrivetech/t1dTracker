# Minimal detekt configuration - build upon default config
# Adjust rules as your project needs evolve.
build:
  # Increase allowed reported issues temporarily so CI doesn't fail the build
  # while we incrementally address the rule violations. Current analysis
  # reported ~112 weighted issues; 1000 is a safe temporary ceiling.
  maxIssues: 1000

processors:
  active: true

comments:
  active: true

# You can disable or tune specific rules below.
style:
  MagicNumber:
    active: false
