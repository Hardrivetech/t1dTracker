name: CI — Lint & Static Analysis

on:
  push:
    paths:
      - '**/*.kt'
      - '**/*.kts'
      - 'build.gradle'
      - 'build.gradle.kts'
  pull_request:
    paths:
      - '**/*.kt'
      - '**/*.kts'
      - 'build.gradle'
      - 'build.gradle.kts'

jobs:
  lint:
    name: Kotlin lint & Detekt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run ktlintCheck and detekt
        run: |
          ./gradlew --no-daemon ktlintCheck detekt -x test
        env:
          JAVA_TOOL_OPTIONS: '-Dfile.encoding=UTF8'
