name: CI Instrumented Tests (scaffold)

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: 'Set to true to run connected instrumented tests' 
        required: false
        default: 'false'

jobs:
  instrumented-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Info
        run: |
          echo "This workflow is a scaffold for running Android instrumented tests."
          echo "By default it will not run tests; set 'run_tests=true' when you're ready and ensure emulators/credentials are configured."

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare Android SDK (no-op placeholder)
        run: |
          echo "Add Android SDK setup steps here (sdkmanager, avdmanager) if enabling emulator runs."

      - name: Run connected tests (optional)
        if: ${{ github.event.inputs.run_tests == 'true' }}
        run: |
          chmod +x ./gradlew
          ./gradlew connectedAndroidTest --no-daemon
