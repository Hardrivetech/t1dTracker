name: Release Pipeline (manual)

on:
  workflow_dispatch:
    inputs:
      run_build:
        description: 'Set to true to run Gradle build in CI'
        required: false
        default: 'false'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Info
        run: |
          echo "This is a manual release workflow scaffold."
          echo "To run builds/uploads set inputs.run_build=true and configure GOOGLE_PLAY_JSON secret."

      - name: Prepare (no-op)
        run: |
          echo "Prepare release: review and customize .fastlane/Fastfile before enabling automated builds."

      # Optional: run Gradle bundle if requested (disabled by default)
      - name: Run Gradle Bundle (optional)
        if: ${{ github.event.inputs.run_build == 'true' }}
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon

      - name: Fastlane (placeholder)
        run: |
          echo "Fastlane lanes are scaffolds in fastlane/Fastfile. Configure secrets and uncomment actions before use."
